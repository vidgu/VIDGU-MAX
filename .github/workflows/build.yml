name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          bubblewrap init --manifest https://vidgu.netlify.app/manifest.json --no-prompt || true
          bubblewrap build --accept_tos || echo "Build finish"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VidguMax-APK
          path: ./*.apk
