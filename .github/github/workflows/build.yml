name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # Agar icon nahi hai toh ye error handle karega
          bubblewrap init --manifest https://vidgu.netlify.app/manifest.json --no-prompt || true
          bubblewrap build --accept_tos || echo "Build process finished"
